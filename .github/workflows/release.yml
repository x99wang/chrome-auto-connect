name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            scripts/chrome-auto-connect.sh
            scripts/allow-clicker.sh
            scripts/allow-clicker.applescript
            scripts/check-pages.js
            SKILL.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
